<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
    <script data-goatcounter="https://zprats.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
    <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">Pratyaksh Sharma</a>
        <nav aria-label="Main navigation">
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <a href="https://www.linkedin.com/in/pratyakshs10/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://github.com/zprats" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

</body>
</html>
