<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
</head>
<body>
    <header class="site-header">
        <a class="site-title" href="{{ '/' | relative_url }}">Pratyaksh Sharma</a>
        <nav aria-label="Main navigation">
            <a href="{{ '/blog/' | relative_url }}">Blog</a>
            <a href="https://www.linkedin.com/in/pratyakshs10/" target="_blank" rel="noopener">LinkedIn</a>
            <a href="https://github.com/zprats" target="_blank" rel="noopener">GitHub</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>
</body>
</html>
