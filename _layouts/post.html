---
layout: default
---

<article class="post">
    <header class="post-header">
        <a class="back-link" href="{{ '/blog/' | relative_url }}">Back to blog</a>
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p>{{ page.description }}</p>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>
</article>
