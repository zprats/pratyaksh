<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratyaksh Sharma</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .links a:hover {
            color: #fff;
            border-color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pratyaksh Sharma</h1>
        <div class="links">
            <a href="https://www.linkedin.com/in/pratyakshs10/" target="_blank">LinkedIn</a>
            <a href="https://github.com/zprats" target="_blank">GitHub</a>
        </div>
    </div>
</body>
</html>
